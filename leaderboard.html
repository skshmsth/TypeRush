<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard - TypeRush</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="dark-theme">
<div class="container">
  <div class="header">
    <h1>TypeRush Leaderboard</h1>
  </div>

  <!-- Add space -->
  <div style="height: 20px;"></div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Difficulty:</label>
      <select id="difficultyFilter">
        <option value="all">All Difficulties</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="loadLeaderboard()">
      <i class="fas fa-sync-alt"></i> Apply Filters
    </button>
  </div>

  <!-- Add space between filters and leaderboard -->
  <div style="height: 30px;"></div>

  <!-- Leaderboard -->
  <div class="leaderboard-container">
    <div id="leaderboard" class="leaderboard">
      <div class="loading">Loading leaderboard...</div>
    </div>
  </div>

  <!-- Add space before buttons -->
  <div style="height: 40px;"></div>

  <div class="leaderboard-actions">
    <a href="index.html" class="btn btn-primary">
      <i class="fas fa-arrow-left"></i> Back to Typing Test
    </a>
    <button class="btn btn-secondary" onclick="loadLeaderboard()">
      <i class="fas fa-sync-alt"></i> Refresh
    </button>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:4000/api';

async function loadLeaderboard() {
  try {
    const difficulty = document.getElementById('difficultyFilter').value;
    
    const params = new URLSearchParams();
    if (difficulty !== 'all') params.append('difficulty', difficulty);
    
    const url = `${API_BASE}/leaderboard?${params.toString()}`;
    
    const res = await fetch(url);
    const data = await res.json();
    
    displayLeaderboard(data.leaders);
  } catch (error) {
    document.getElementById('leaderboard').innerHTML = `
      <div class="error">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Failed to load leaderboard. Make sure the backend server is running.</p>
        <small>Error: ${error.message}</small>
        <br><br>
        <p>Run these commands in your backend folder:</p>
        <code>npm install</code><br>
        <code>npm start</code>
      </div>
    `;
  }
}

function displayLeaderboard(leaders) {
  const container = document.getElementById('leaderboard');
  
  if (!leaders || leaders.length === 0) {
    container.innerHTML = '<div class="no-data">No records found for the selected filters.</div>';
    return;
  }

  container.innerHTML = `
    <div class="leaderboard-header">
      <div class="rank">Rank</div>
      <div class="name">Player</div>
      <div class="wpm">WPM</div>
      <div class="accuracy">Accuracy</div>
      <div class="details">Details</div>
    </div>
    <div class="leaderboard-list">
      ${leaders.map((player, index) => `
        <div class="leaderboard-item ${index < 3 ? 'top-' + (index + 1) : ''}">
          <div class="rank">
            ${index < 3 ? '<i class="fas fa-trophy"></i>' : ''}
            ${index + 1}
          </div>
          <div class="name">${player.username}</div>
          <div class="wpm">${player.wpm}</div>
          <div class="accuracy">${player.accuracy}%</div>
          <div class="details">
            <small>${player.difficulty}</small>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// Load leaderboard when page loads
document.addEventListener('DOMContentLoaded', () => {
  loadLeaderboard();
});
</script>

<style>
.filters {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
  align-items: end;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.filter-group label {
  font-size: 0.9rem;
  color: var(--text-secondary);
  font-weight: 600;
}

.filter-group select {
  padding: 10px 12px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  min-width: 150px;
  cursor: pointer;
}

.leaderboard-container {
  margin-bottom: 30px;
}

.leaderboard-header {
  display: grid;
  grid-template-columns: 80px 1fr 100px 100px 120px;
  gap: 15px;
  padding: 20px 25px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 12px 12px 0 0;
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 0;
}

.leaderboard-list {
  border: 1px solid var(--border-color);
  border-top: none;
  border-radius: 0 0 12px 12px;
  overflow: hidden;
}

.leaderboard-item {
  display: grid;
  grid-template-columns: 80px 1fr 100px 100px 120px;
  gap: 15px;
  padding: 18px 25px;
  border-bottom: 1px solid var(--border-color);
  align-items: center;
  transition: background-color 0.2s ease;
}

.leaderboard-item:hover {
  background: var(--bg-tertiary);
}

.leaderboard-item:last-child {
  border-bottom: none;
}

.leaderboard-item.top-1 {
  background: linear-gradient(135deg, #ffd70020, transparent);
  border-left: 4px solid #ffd700;
}

.leaderboard-item.top-2 {
  background: linear-gradient(135deg, #c0c0c020, transparent);
  border-left: 4px solid #c0c0c0;
}

.leaderboard-item.top-3 {
  background: linear-gradient(135deg, #cd7f3220, transparent);
  border-left: 4px solid #cd7f32;
}

.rank {
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1.1rem;
}

.rank .fa-trophy {
  color: #ffd700;
  font-size: 1.2rem;
}

.top-2 .rank .fa-trophy {
  color: #c0c0c0;
}

.top-3 .rank .fa-trophy {
  color: #cd7f32;
}

.name {
  font-weight: 600;
  font-size: 1.1rem;
}

.wpm {
  font-weight: 700;
  color: var(--accent-color);
  font-size: 1.1rem;
}

.accuracy {
  color: var(--success-color);
  font-weight: 600;
}

.details small {
  color: var(--text-secondary);
  font-size: 0.8rem;
}

.loading, .error, .no-data {
  text-align: center;
  padding: 50px;
  color: var(--text-secondary);
  font-size: 1.1rem;
}

.error {
  color: var(--error-color);
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid var(--error-color);
  border-radius: 12px;
  padding: 40px 30px;
}

.error .fa-exclamation-triangle {
  font-size: 3rem;
  margin-bottom: 20px;
}

.error code {
  background: var(--bg-primary);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: monospace;
  margin: 8px 0;
  display: inline-block;
  font-size: 0.9rem;
}

.leaderboard-actions {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 20px;
}

/* Add more spacing for mobile */
@media (max-width: 768px) {
  .filters {
    flex-direction: column;
    align-items: stretch;
    gap: 20px;
  }
  
  .leaderboard-header,
  .leaderboard-item {
    grid-template-columns: 60px 1fr 80px;
    gap: 12px;
    padding: 15px 20px;
  }
  
  .accuracy, .details {
    display: none;
  }
  
  .leaderboard-actions {
    flex-direction: column;
    gap: 12px;
  }
  
  .leaderboard-actions .btn {
    width: 100%;
    justify-content: center;
  }
}

@media (max-width: 480px) {
  .leaderboard-header,
  .leaderboard-item {
    grid-template-columns: 50px 1fr 70px;
    padding: 12px 15px;
    font-size: 0.9rem;
  }
  
  .rank {
    font-size: 1rem;
  }
  
  .name, .wpm {
    font-size: 1rem;
  }
}
</style>
</body>
</html>
